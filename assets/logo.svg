<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Namankhabar logo">
  <!-- Icon-only emblem. Wordmark is added to PNG with a Devanagari-capable font. -->
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#0b1220" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Brand circle -->
  <g filter="url(#shadow)">
    <circle cx="512" cy="512" r="470" fill="#1d4ed8"/>
    <!-- Subtle top highlight -->
    <circle cx="380" cy="250" r="300" fill="rgba(255,255,255,0.06)"/>
    <!-- Subtle bottom-right color -->
    <circle cx="660" cy="670" r="360" fill="rgba(124,58,237,0.18)"/>
    <!-- Subtle outer ring -->
    <circle cx="512" cy="512" r="460" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="10"/>
  </g>

  <!-- Newspaper icon -->
  <g opacity="0.98">
    <rect x="302" y="250" width="420" height="430" rx="56"
          fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.86)" stroke-width="16"/>

    <!-- Fold -->
    <path d="M512 240 L724 402 L724 505 L512 402 Z" fill="rgba(255,255,255,0.10)"/>
    <path d="M512 240 L724 402" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="18" stroke-linecap="round"/>

    <!-- Lines -->
    <line x1="360" y1="390" x2="662" y2="390" stroke="rgba(255,255,255,0.92)" stroke-width="14" stroke-linecap="round"/>
    <line x1="360" y1="468" x2="644" y2="468" stroke="rgba(255,255,255,0.78)" stroke-width="14" stroke-linecap="round"/>
    <line x1="360" y1="546" x2="656" y2="546" stroke="rgba(255,255,255,0.65)" stroke-width="14" stroke-linecap="round"/>

    <!-- Bookmark accent -->
    <path d="M460 610 C485 585 539 585 564 610"
          fill="none" stroke="rgba(255,255,255,0.66)" stroke-width="10" stroke-linecap="round"/>

    <!-- Modern “N” monogram (abstract) -->
    <path d="M420 322 V 656" stroke="rgba(255,255,255,0.95)" stroke-width="22" stroke-linecap="round"/>
    <path d="M420 322 L640 656" stroke="rgba(255,255,255,0.95)" stroke-width="22" stroke-linecap="round"/>
    <path d="M640 656 V 322" stroke="rgba(255,255,255,0.95)" stroke-width="22" stroke-linecap="round"/>
  </g>
</svg>

